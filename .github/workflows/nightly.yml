name: Nightly scrape + sync to Supabase

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # WWE, AEW, ROH, TNA, NJPW, Stardom, CMLL
      CAGEMATCH_PROMOTION_IDS: "1,2287,4,5,7,745,78"
      CAGEMATCH_SDH_PROMOTION_SLUGS: "wwe,aew,roh,tna,njpw,stardom,cmll"
    steps:
      - uses: actions/checkout@v4

      # data/ (jsonl history, warehouse.duckdb, cursors) persists across runs here so
      # `--resume`/`export nightly` stay incremental instead of redoing everything.
      # Cache entries are immutable per-key, so we always save a fresh run-id key and
      # restore the most recent prior one via the restore-keys prefix fallback.
      # Split restore/save so a failed sync still persists scraped data for the next run.
      - name: Restore data/ cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: cagematch-data-${{ github.run_id }}
          restore-keys: |
            cagematch-data-

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Install dependencies
        run: uv sync

      - name: Install patchright browser
        run: uv run patchright install chromium --with-deps

      - name: Scrape promotions
        run: uv run cagematch scrape promotions --resume
        env:
          CAGEMATCH_HEADLESS: "true"
          # CAGEMATCH_PROXY_SERVER: ${{ secrets.CAGEMATCH_PROXY_SERVER }}
          # CAGEMATCH_PROXY_USERNAME: ${{ secrets.CAGEMATCH_PROXY_USERNAME }}
          # CAGEMATCH_PROXY_PASSWORD: ${{ secrets.CAGEMATCH_PROXY_PASSWORD }}

      - name: Scrape wrestlers
        run: uv run cagematch scrape wrestlers --resume
        env:
          CAGEMATCH_HEADLESS: "true"
          # CAGEMATCH_PROXY_SERVER: ${{ secrets.CAGEMATCH_PROXY_SERVER }}
          # CAGEMATCH_PROXY_USERNAME: ${{ secrets.CAGEMATCH_PROXY_USERNAME }}
          # CAGEMATCH_PROXY_PASSWORD: ${{ secrets.CAGEMATCH_PROXY_PASSWORD }}

      - name: Scrape titles
        run: uv run cagematch scrape titles --resume
        env:
          CAGEMATCH_HEADLESS: "true"
          # CAGEMATCH_PROXY_SERVER: ${{ secrets.CAGEMATCH_PROXY_SERVER }}
          # CAGEMATCH_PROXY_USERNAME: ${{ secrets.CAGEMATCH_PROXY_USERNAME }}
          # CAGEMATCH_PROXY_PASSWORD: ${{ secrets.CAGEMATCH_PROXY_PASSWORD }}

      # Nightly only needs new/updated events. Historical years (default since 2020)
      # are a one-shot backfill — `--resume` still walks every year list page otherwise.
      - name: Scrape matches
        run: |
          export CAGEMATCH_MATCHES_SINCE_YEAR="$(date -u +%Y)"
          uv run cagematch scrape matches --resume
        env:
          CAGEMATCH_HEADLESS: "true"
          # CAGEMATCH_PROXY_SERVER: ${{ secrets.CAGEMATCH_PROXY_SERVER }}
          # CAGEMATCH_PROXY_USERNAME: ${{ secrets.CAGEMATCH_PROXY_USERNAME }}
          # CAGEMATCH_PROXY_PASSWORD: ${{ secrets.CAGEMATCH_PROXY_PASSWORD }}

      # SDH is plain HTTP (no Patchright / Sucuri). Run after Cagematch so a browser
      # flake doesn't block the cheaper secondary source.
      - name: Scrape SDH titles
        run: uv run cagematch scrape sdh_titles --resume

      - name: Scrape SDH wrestlers
        run: uv run cagematch scrape sdh_wrestlers --resume

      - name: Flatten into the warehouse
        run: uv run cagematch export nightly

      - name: Sync to Supabase
        run: uv run cagematch export sync-postgres
        env:
          CAGEMATCH_POSTGRES_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Save data/ cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: cagematch-data-${{ github.run_id }}
